<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblia Multi-versiĂłn</title>
  <link rel="icon" type="image/jpeg" href="fabicon.jpg">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/filters.css">
<link rel="stylesheet" href="css/content.css">
<link rel="stylesheet" href="css/responsive.css">
  
  <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
  <div class="container">
    
    <header>
      <div class="header-content">
        <h1 id="mainTitle">đź“– Biblia Digital</h1>

        <!-- Control tamaĂ±o texto -->
        <div class="font-track" id="fontTrack">
          <span class="font-knob" id="fontKnob">A</span>
        </div>

        <!-- Switch modo noche -->
        <label class="switch">
          <input type="checkbox" id="themeCheckbox">
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <!-- TABS DE MODO -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="lectura" title="Lectura">
        <span class="tab-icon">đź“–</span>
        <span class="tab-text">Lectura</span>
      </button>
      <button class="mode-tab" data-mode="comparacion" title="ComparaciĂłn">
        <span class="tab-icon">âš–ď¸Ź</span>
        <span class="tab-text">ComparaciĂłn</span>
      </button>
      <button class="mode-tab" data-mode="concordancia" title="Concordancia">
        <span class="tab-icon">đź”Ť</span>
        <span class="tab-text">Concordancia</span>
      </button>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO LECTURA       -->
    <!-- ======================== -->
    <div id="panelLectura" class="panel-mode">

      <!-- BotĂłn toggle filtros (solo mĂłvil) -->
      <button id="toggleFiltersLectura" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">â–?/span>
          <span id="toggleRefLectura" class="filters-toggle-ref">Selecciona un libro</span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersLectura" class="filters-collapsible">
        <div class="filters">
          <div class="filter-group">
            <label for="version">VersiĂłn</label>
            <select id="version">
              <option value="">Cargando versiones...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="book">Libro</label>
            <select id="book" disabled>
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="chapter">CapĂ­tulo</label>
            <select id="chapter" disabled>
              <option value="">Selecciona libro</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="verse">VersĂ­culo (opcional)</label>
            <select id="verse" disabled>
              <option value="">Todo el capĂ­tulo</option>
            </select>
          </div>
        </div>
      </div>

      <!-- BotĂłn flotante para copiar (opcionalmente) -->
      <button id="copyVersesBtn" class="floating-action-button" style="display:none;" title="Copiar versĂ­culos seleccionados">
          đź“‹ Copiar (<span id="selectedVersesCount">0</span>)
      </button>
      
      <!-- Estructura del Modal para Copiar -->
      <div id="copyModal" class="modal" style="display: none;">
          <div class="modal-content">
              <span class="close-button" id="closeCopyModal">&times;</span>
              <h3>VersĂ­culos Seleccionados</h3>
              <textarea id="selectedVersesTextarea" readonly></textarea>
              <button id="doCopyBtn" class="btn-search">Copiar al Portapapeles</button>
              <div id="copyFeedback" class="copy-feedback"></div>
          </div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO COMPARACIĂ“N   -->
    <!-- ======================== -->
    <div id="panelComparacion" class="panel-mode" style="display:none;">

      <!-- BotĂłn toggle filtros (solo mĂłvil) -->
      <button id="toggleFiltersComp" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">â–?/span>
          <span id="toggleRefComp" class="filters-toggle-ref">Selecciona versiones</span>
          <span id="compOrientationHint" class="orientation-hint">
             <span class="hint-icon">đź”„</span> <span class="hint-text">Gira para comparar</span>
          </span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersComp" class="filters-collapsible">
        <div class="filters">
          <div class="filter-group">
            <label for="compVersionA">VersiĂłn A</label>
            <select id="compVersionA">
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compVersionB">VersiĂłn B</label>
            <select id="compVersionB">
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compBook">Libro</label>
            <select id="compBook" disabled>
              <option value="">-- Selecciona libro --</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compChapter">CapĂ­tulo</label>
            <select id="compChapter" disabled>
              <option value="">-- Selecciona capĂ­tulo --</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compVerse">VersĂ­culo (opcional)</label>
            <select id="compVerse" disabled>
              <option value="">Todo el capĂ­tulo</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO CONCORDANCIA  -->
    <!-- ======================== -->
    <div id="panelConcordancia" class="panel-mode" style="display:none;">

      <!-- BotĂłn toggle filtros (solo mĂłvil) -->
      <button id="toggleFiltersConc" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">â–?/span>
          <span id="toggleRefConc" class="filters-toggle-ref">Buscar palabra</span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersConc" class="filters-collapsible">
        <div class="filters concordancia-filters">
          <div class="filter-group">
            <label for="concVersion">VersiĂłn</label>
            <select id="concVersion">
              <option value="">Cargando versiones...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="concTestament">Filtrar por</label>
            <select id="concTestament">
              <option value="ALL">Toda la Biblia</option>
              <option value="OT">đź“ś Antiguo Testamento</option>
              <option value="NT">âśťď¸Ź Nuevo Testamento</option>
            </select>
          </div>

          <div class="filter-group search-input-group">
            <label for="concQuery">Buscar palabra o frase</label>
            <div class="search-wrapper">
              <input
                type="text"
                id="concQuery"
                placeholder="Ej: amor, fe, esperanza..."
                autocomplete="off"
                maxlength="100"
              >
              <button id="concSearchBtn" class="btn-search btn-conc-search">đź”Ž Buscar</button>
            </div>
            <label class="exact-toggle">
              <input type="checkbox" id="concExact">
              <span class="exact-toggle-label">Palabra exacta</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="reference" id="reference"></div>

    <div class="content" id="content">
      <p class="placeholder">Selecciona una versiĂłn y libro para comenzar</p>
    </div>

  </div>
  
  <script src="app.js"></script>
</body>
</html>
