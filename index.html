<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblia Multi-versión</title>
  <link rel="icon" type="image/jpeg" href="fabicon.jpg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    
<header>
  <div class="header-content">
    <h1 id="mainTitle">📖 Biblia Digital</h1>

    <!-- Botón de ajustes -->
    <button id="settingsBtn" class="settings-btn" title="Ajustes">
      ☰
    </button>
  </div>

  <!-- Panel flotante de ajustes (oculto por defecto) -->
  <div id="settingsPanel" class="settings-panel">
    <div class="settings-panel-content">
      <div class="settings-panel-header">
        <h3>Ajustes</h3>
        <button id="closeSettingsBtn" class="close-settings-btn">&times;</button>
      </div>

      <div class="settings-panel-body">
        <!-- Control tamaño texto -->
        <div class="settings-item">
          <label>Tamaño de texto</label>
          <div class="font-track" id="fontTrack">
            <span class="font-knob" id="fontKnob">A</span>
          </div>
        </div>

        <!-- Switch modo noche -->
        <div class="settings-item">
          <label>Modo oscuro</label>
          <label class="switch">
            <input type="checkbox" id="themeCheckbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
</header>

    <!-- TABS DE MODO -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="lectura" title="Lectura">
        <span class="tab-icon">📖</span>
        <span class="tab-text">Lectura</span>
      </button>
      <button class="mode-tab" data-mode="comparacion" title="Comparación">
        <span class="tab-icon">⚖️</span>
        <span class="tab-text">Comparación</span>
      </button>
      <button class="mode-tab" data-mode="concordancia" title="Concordancia">
        <span class="tab-icon">🔍</span>
        <span class="tab-text">Concordancia</span>
      </button>
      <button class="mode-tab" data-mode="strong" title="Strong">
      <span class="tab-icon">אΩ</span>
      <span class="tab-text">Strong</span>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO LECTURA       -->
    <!-- ======================== -->
    <div id="panelLectura" class="panel-mode">

      <!-- Botón toggle filtros (solo móvil) -->
      <button id="toggleFiltersLectura" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">▲</span>
          <span id="toggleRefLectura" class="filters-toggle-ref">Selecciona un libro</span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersLectura" class="filters-collapsible">
        <div class="filters">
          <div class="filter-group">
            <label for="version">Versión</label>
            <select id="version">
              <option value="">Cargando versiones...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="book">Libro</label>
            <select id="book" disabled>
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="chapter">Capítulo</label>
            <select id="chapter" disabled>
              <option value="">Selecciona libro</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="verse">Versículo (opcional)</label>
            <select id="verse" disabled>
              <option value="">Todo el capítulo</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Botón flotante para copiar (opcionalmente) -->
      <button id="copyVersesBtn" class="floating-action-button" style="display:none;" title="Copiar versículos seleccionados">
          📋 Copiar (<span id="selectedVersesCount">0</span>)
      </button>
      
      <!-- Estructura del Modal para Copiar -->
      <div id="copyModal" class="modal" style="display: none;">
          <div class="modal-content">
              <span class="close-button" id="closeCopyModal">&times;</span>
              <h3>Versículos Seleccionados</h3>
              <textarea id="selectedVersesTextarea" readonly></textarea>
              <button id="doCopyBtn" class="btn-search">Copiar al Portapapeles</button>
              <div id="copyFeedback" class="copy-feedback"></div>
          </div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO COMPARACIÓN   -->
    <!-- ======================== -->
    <div id="panelComparacion" class="panel-mode" style="display:none;">

      <!-- Botón toggle filtros (solo móvil) -->
      <button id="toggleFiltersComp" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">▲</span>
          <span id="toggleRefComp" class="filters-toggle-ref">Selecciona versiones</span>
          <span id="compOrientationHint" class="orientation-hint">
             <span class="hint-icon">🔄</span> <span class="hint-text">Gira para comparar</span>
          </span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersComp" class="filters-collapsible">
        <div class="filters">
          <div class="filter-group">
            <label for="compVersionA">Versión A</label>
            <select id="compVersionA">
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compVersionB">Versión B</label>
            <select id="compVersionB">
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compBook">Libro</label>
            <select id="compBook" disabled>
              <option value="">-- Selecciona libro --</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compChapter">Capítulo</label>
            <select id="compChapter" disabled>
              <option value="">-- Selecciona capítulo --</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="compVerse">Versículo (opcional)</label>
            <select id="compVerse" disabled>
              <option value="">Todo el capítulo</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO CONCORDANCIA  -->
    <!-- ======================== -->
    <div id="panelConcordancia" class="panel-mode" style="display:none;">

      <!-- Botón toggle filtros (solo móvil) -->
      <button id="toggleFiltersConc" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">▲</span>
          <span id="toggleRefConc" class="filters-toggle-ref">Buscar palabra</span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersConc" class="filters-collapsible">
        <div class="filters concordancia-filters">
          <div class="filter-group">
            <label for="concVersion">Versión</label>
            <select id="concVersion">
              <option value="">Cargando versiones...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="concTestament">Filtrar por</label>
            <select id="concTestament">
              <option value="ALL">Toda la Biblia</option>
              <option value="OT">📜 Antiguo Testamento</option>
              <option value="NT">✝️ Nuevo Testamento</option>
            </select>
          </div>

          <div class="filter-group search-input-group">
            <label for="concQuery">Buscar palabra o frase</label>
            <div class="search-wrapper">
              <input
                type="text"
                id="concQuery"
                placeholder="Ej: amor, fe, esperanza..."
                autocomplete="off"
                maxlength="100"
              >
              <button id="concSearchBtn" class="btn-search btn-conc-search">🔎 Buscar</button>
            </div>
            <label class="exact-toggle">
              <input type="checkbox" id="concExact">
              <span class="exact-toggle-label">Palabra exacta</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- PANEL MODO STRONG        -->
    <!-- ======================== -->
    <div id="panelStrong" class="panel-mode" style="display:none;">

      <!-- Botón toggle filtros (solo móvil) -->
      <button id="toggleFiltersStrong" class="filters-toggle">
        <div class="filters-toggle-left">
          <span class="filters-toggle-icon">▲</span>
          <span id="toggleRefStrong" class="filters-toggle-ref">Selecciona un libro</span>
        </div>
        <span class="filters-toggle-hint">Filtros</span>
      </button>

      <!-- Filtros colapsables -->
      <div id="filtersStrong" class="filters-collapsible">
        <div class="filters">
          <div class="filter-group">
            <label for="strongVersion">Versión</label>
            <select id="strongVersion" disabled>
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="strongBook">Libro</label>
            <select id="strongBook" disabled>
              <option value="">-- Selecciona libro --</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="strongChapter">Capítulo</label>
            <select id="strongChapter" disabled>
              <option value="">-- Selecciona capítulo --</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="strongVerse">Versículo (opcional)</label>
            <select id="strongVerse" disabled>
              <option value="">Todo el capítulo</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ======================== -->
    <!-- PANEL INFERIOR STRONG    -->
    <!-- ======================== -->
    <div id="strongBottomPanel" class="strong-bottom-panel">
      <div class="strong-bottom-header">
        <div class="strong-bottom-title">
          <span id="strongBottomCode" class="strong-code-badge">H0000</span>
          <span id="strongBottomCount" class="strong-ref-count"></span>
        </div>
        <button id="strongBottomClose" class="strong-bottom-close">&times;</button>
      </div>
      <div id="strongBottomContent" class="strong-bottom-content">
        <!-- Las referencias se cargan aquí -->
      </div>
    </div>
    
    <div class="reference" id="reference"></div>

    <div class="content" id="content">
      <p class="placeholder">Selecciona una versión y libro para comenzar</p>
    </div>

  </div>
  
  <script type="module" script src="JS/app.js"></script>
</body>
</html>
