name: 🌿 Seed Bible RV60

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install prisma @prisma/client xml2js
      - name: DB Push (DIRECT for CLI)
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}  # ! Direct para push
      - name: Generate Client (Accelerate)
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}  # Accelerate para client
      - name: Seed (Accelerate)
        run: node seed-node.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}  # Writes OK in Accelerate
