name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container: postgres:17

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
        run: |
          pg_dump "$DATABASE_URL" -F c -Z 9 -f backup.dump

      - name: Save backup
        run: |
          mkdir -p backups
          mv backup.dump backups/backup-$(date +%F).dump

      - name: Keep only last 4 backups
        run: |
          ls -t backups/backup-*.dump | tail -n +5 | xargs -r rm

      - name: Install git
        run: |
          apt-get update
          apt-get install -y git

      - name: Commit backup
        run: |
          cd $GITHUB_WORKSPACE
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add backups/
          git commit -m "Weekly database backup" || echo "No changes"
          git push