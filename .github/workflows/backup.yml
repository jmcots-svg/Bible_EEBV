name: 🅱️Supabase DB Backup to GitHub

on:
  schedule:
    - cron: "0 3 * * 0" # Domingo 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client gzip

      - name: Dump and compress database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Creating compressed database dump..."
          pg_dump "$DATABASE_URL" -F c | gzip > data/backup-$(date +%F).dump.gz
          echo "Backup saved in data/"

      - name: Rotate old backups (keep last 4)
        run: |
          cd data
          ls -t backup-*.dump.gz | tail -n +5 | xargs -r rm

      - name: Commit backup to GitHub
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git commit -m "Weekly database backup" || echo "No changes"
          git push