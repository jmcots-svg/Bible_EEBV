name: 🅱️ Supabase DB Backup to GitHub

on:
  schedule:
    - cron: "0 3 * * 0" # Domingo 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL 17 client
        run: |
          # Añadir repositorio oficial de PostgreSQL para obtener la v17
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          
          # Actualizar e instalar el cliente específico
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 gzip

      - name: Create data directory if not exists
        run: mkdir -p data

      - name: Dump and compress database
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
        run: |
          echo "Creating compressed database dump using pg_dump 17..."
          # Usamos el path completo para asegurar que usamos la v17 si hubiera conflicto
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -F c | gzip > data/backup-$(date +%F).dump.gz
          echo "Backup saved in data/"

      - name: Rotate old backups (keep last 4)
        run: |
          cd data
          # Listar por fecha, saltar los primeros 4 y borrar el resto
          ls -t backup-*.dump.gz | tail -n +5 | xargs -r rm

      - name: Commit backup to GitHub
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          # Solo hace commit si hay cambios reales para evitar fallos en el workflow
          git commit -m "Weekly database backup: $(date +%F)" || echo "No changes to commit"
          git push
