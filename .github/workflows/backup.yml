name: 🌿 Supabase DB Backup

on:
  schedule:
    - cron: "0 3 * * 0"  # Domingo 03:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client gzip curl jq

      - name: Dump and compress database
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
        run: |
          echo "Starting database dump..."
          pg_dump "$DATABASE_URL" -F c | gzip > backup-$(date +%F).dump.gz
          echo "Database dump complete."

      - name: Upload backup to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Uploading backup..."
          curl -X POST "$SUPABASE_URL/storage/v1/object/backups" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -F "file=@backup-$(date +%F).dump.gz"

      - name: Rotate old backups (keep last 4)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Rotating backups (keep last 4)..."
          BACKUPS=$(curl -s -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/storage/v1/object/list/backups" | jq -r '.[] | .name' | sort)
          COUNT=$(echo "$BACKUPS" | wc -l)
          if [ $COUNT -le 4 ]; then
            echo "No backups to delete."
          else
            DELETE=$(echo "$BACKUPS" | head -n $(($COUNT-4)))
            for file in $DELETE; do
              echo "Deleting $file"
              curl -X DELETE "$SUPABASE_URL/storage/v1/object/backups/$file" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_KEY"
            done
          fi