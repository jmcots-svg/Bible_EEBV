name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 3 * * 0"   # domingo 03:00
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            -h ${{ secrets.SUPABASE_DB_HOST }} \
            -p ${{ secrets.SUPABASE_DB_PORT }} \
            -U ${{ secrets.SUPABASE_DB_USER }} \
            -d ${{ secrets.SUPABASE_DB_NAME }} \
            -F c \
            -f backup.dump

      - name: Save backup
        run: |
          mkdir -p backups
          mv backup.dump backups/backup-$(date +%F).dump

      - name: Keep only last 4 backups
        run: |
          ls -t backups/backup-*.dump | tail -n +5 | xargs -r rm

      - name: Commit backup
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add backups/
          git commit -m "Weekly database backup" || echo "No changes"
          git push