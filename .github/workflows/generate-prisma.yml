name: Generate Prisma Client
on:
  push:
    branches: [ main ] # Cambia "main" por "master" si tu rama principal se llama master

permissions:
  contents: write # 👈 VITAL: Esto da permiso al bot para hacer el 'git push'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      
- name: Install Prisma 6.2.1
        run: |
          rm -f package-lock.json
          npm install prisma@6.2.1 @prisma/client@6.2.1 --save-dev --force
          # Creamos un package.json básico para que Prisma genere módulos ESM
          echo '{"type": "module"}' > package.json
        
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          # 👈 Le pasamos el secreto para que Prisma no se queje
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 
          
      - name: Commit generated client
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Añadimos ambas posibles rutas por si tu schema está en la raíz o en una carpeta
          git add -f generated/ || true
          git add -f prisma/generated/ || true
          git commit -m "chore: generate prisma client" || echo "No changes to commit"
          git push
