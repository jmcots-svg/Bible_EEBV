name: DB Push
on: [push]

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # ← NUEVO: cancela si tarda >10min
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Push Schema to DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }} 
        run: |
          # INSTALAMOS LA VERSIÓN 5
          npm install prisma@5 -g
          
          # Borramos config de Deno
          rm -f prisma.config.ts
          
          # PUSH con flags para que NO pida confirmación
          prisma db push \
            --schema=./prisma/schema.prisma \
            --accept-data-loss \
            --skip-generate
