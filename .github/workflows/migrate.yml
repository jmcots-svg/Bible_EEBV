name: Prisma Migrate
on: [push]
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node (Para el CLI de Prisma)
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Apply Prisma Migration
        run: |
          npm install prisma@latest -g
          # Forzamos la ruta del schema para evitar que lea otros archivos de config
          prisma migrate deploy --schema=./prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
