name: Prisma DB Push
on: [push]
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Push Schema to DB
        run: |
          # 1. Instalamos prisma
          npm install prisma@latest -g
          
          # 2. ELIMINAMOS el archivo que causa el error de parseo (solo en este runner)
          rm -f prisma.config.ts
          
          # 3. Empujamos el esquema
          # Usamos --skip-generate para que no intente crear el cliente de Node, solo la DB
          prisma db push --schema=./prisma/schema.prisma --skip-generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
