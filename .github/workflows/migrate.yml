name: Prisma DB Push
on: [push]
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Push Schema to DB
        run: |
          # INSTALAMOS LA VERSIÓN 5 (Estable y compatible con tu esquema)
          npm install prisma@5 -g
          
          # Borramos el config de Deno para que no confunda al CLI de Node
          rm -f prisma.config.ts
          
          # Ejecutamos el push con la versión 5
          prisma db push --schema=./prisma/schema.prisma --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
